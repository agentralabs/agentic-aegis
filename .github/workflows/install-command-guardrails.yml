name: Install & Command Guardrails

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build workspace
        run: cargo build --workspace
      - name: Check command surface
        run: bash scripts/check-command-surface.sh
      - name: Check MCP consolidation
        run: bash scripts/check-mcp-consolidation.sh
      - name: Run tests
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
