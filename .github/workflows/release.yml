name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/aegis dist/
          cp target/${{ matrix.target }}/release/agentic-aegis-mcp dist/
          tar -czf agentic-aegis-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz -C dist .
      - uses: softprops/action-gh-release@v1
        with:
          files: agentic-aegis-*.tar.gz
