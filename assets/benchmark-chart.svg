<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 400" role="img" aria-label="AgenticAegis benchmark chart">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#b8b6ae"/>
    </pattern>
  </defs>
  <rect width="1400" height="400" fill="#f2f1ea"/>
  <rect width="1400" height="400" fill="url(#grid)"/>
  <rect x="20" y="20" width="1360" height="360" fill="none" stroke="#111111" stroke-width="2"/>

  <line x1="20" y1="62" x2="1380" y2="62" stroke="#111111" stroke-width="2"/>
  <text x="40" y="48" font-family="'JetBrains Mono', monospace" font-size="14" fill="#5f5c53" letter-spacing="2"> // AGENTRA_LABS: BENCHMARKS</text>
  <rect x="1318" y="36" width="8" height="8" fill="#ea580c"/>
  <text x="1336" y="48" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" letter-spacing="2">004</text>

  <text x="700" y="96" font-family="'JetBrains Mono', monospace" font-size="16" fill="#111111" font-weight="700" text-anchor="middle" letter-spacing="2">AgenticAegis  ·  Criterion 0.5  ·  Apple M4 Pro  ·  Rust 1.90.0 --release</text>

  <!-- Token validation: 0.5 ms -->
  <text x="320" y="138" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Token validation (p99)</text>
  <rect x="340" y="124" width="50" height="20" fill="#ea580c"/>
  <text x="398" y="138" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  0.5 ms</text>

  <!-- Shadow compile: 8.4 ms -->
  <text x="320" y="172" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Shadow compile</text>
  <rect x="340" y="158" width="820" height="20" fill="#111111"/>
  <text x="1168" y="172" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  8.4 ms</text>

  <!-- Sandbox exec: 4.2 ms -->
  <text x="320" y="206" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Sandbox execution</text>
  <rect x="340" y="192" width="420" height="20" fill="#111111"/>
  <text x="768" y="206" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  4.2 ms</text>

  <!-- Security scan: 1.8 ms -->
  <text x="320" y="240" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Security scan</text>
  <rect x="340" y="226" width="180" height="20" fill="#ea580c"/>
  <text x="528" y="240" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  1.8 ms</text>

  <!-- PII detection: 0.9 ms -->
  <text x="320" y="274" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">PII detection</text>
  <rect x="340" y="260" width="90" height="20" fill="#111111"/>
  <text x="438" y="274" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  0.9 ms</text>

  <!-- Session create: 0.3 ms -->
  <text x="320" y="308" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Session create</text>
  <rect x="340" y="294" width="30" height="20" fill="#ea580c"/>
  <text x="378" y="308" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  0.3 ms</text>

  <!-- Throughput -->
  <text x="320" y="342" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" text-anchor="end">Throughput</text>
  <rect x="340" y="328" width="500" height="20" fill="#111111"/>
  <text x="848" y="342" font-family="'JetBrains Mono', monospace" font-size="12" fill="#111111">  50K tokens/sec</text>

  <!-- Tests badge -->
  <text x="320" y="370" font-family="'JetBrains Mono', monospace" font-size="11" fill="#5f5c53" text-anchor="end">250 tests passing</text>
  <rect x="340" y="358" width="100" height="16" fill="#111111"/>
  <text x="348" y="370" font-family="'JetBrains Mono', monospace" font-size="10" fill="#f2f1ea">ALL GREEN</text>
</svg>
