<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" role="img" aria-label="AgenticAegis GitHub hero pane">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#b8b6ae"/>
    </pattern>
  </defs>
  <rect width="1400" height="360" fill="#f2f1ea"/>
  <rect width="1400" height="360" fill="url(#grid)"/>
  <rect x="20" y="20" width="1360" height="320" fill="none" stroke="#111111" stroke-width="2"/>

  <line x1="20" y1="62" x2="1380" y2="62" stroke="#111111" stroke-width="2"/>
  <text x="40" y="48" font-family="'JetBrains Mono', monospace" font-size="14" fill="#5f5c53" letter-spacing="2"> // AGENTRA_LABS: MODULE_HERO</text>
  <rect x="1318" y="36" width="8" height="8" fill="#ea580c"/>
  <text x="1336" y="48" font-family="'JetBrains Mono', monospace" font-size="12" fill="#5f5c53" letter-spacing="2">001</text>

  <!-- Validation layer stack panel -->
  <rect x="46" y="92" width="232" height="232" fill="none" stroke="#111111" stroke-width="2"/>
  <rect x="46" y="92" width="232" height="38" fill="#111111"/>
  <text x="62" y="116" font-family="'JetBrains Mono', monospace" font-size="11" fill="#f2f1ea" letter-spacing="2">AEGIS.LAYER_STACK</text>

  <!-- Layer stack visualization -->
  <rect x="66" y="148" width="192" height="22" fill="none" stroke="#ea580c" stroke-width="2"/>
  <text x="72" y="163" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ea580c">TOKEN_STREAM</text>
  <rect x="66" y="178" width="192" height="22" fill="none" stroke="#111111" stroke-width="2"/>
  <text x="72" y="193" font-family="'JetBrains Mono', monospace" font-size="10" fill="#111111">SHADOW_COMPILE</text>
  <rect x="66" y="208" width="192" height="22" fill="none" stroke="#111111" stroke-width="2"/>
  <text x="72" y="223" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5f5c53">SECURITY_SCAN</text>
  <rect x="66" y="238" width="192" height="22" fill="none" stroke="#b8b6ae" stroke-width="2"/>
  <text x="72" y="253" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5f5c53">PROTECTION</text>
  <rect x="66" y="268" width="192" height="22" fill="none" stroke="#b8b6ae" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="72" y="283" font-family="'JetBrains Mono', monospace" font-size="10" fill="#b8b6ae">ROLLBACK</text>

  <!-- Main title area -->
  <text x="324" y="136" font-family="'JetBrains Mono', monospace" font-size="54" fill="#111111" font-weight="700" letter-spacing="1">AGENTICAEGIS</text>
  <text x="324" y="172" font-family="'JetBrains Mono', monospace" font-size="18" fill="#ea580c" font-weight="700" letter-spacing="2">STREAMING VALIDATION</text>
  <text x="324" y="210" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5f5c53">
    Token-level validation. Shadow compilation. Security scanning. One shield
  </text>
  <text x="324" y="234" font-family="'JetBrains Mono', monospace" font-size="16" fill="#5f5c53">
    catches errors before they reach production.
  </text>

  <!-- Badges -->
  <rect x="324" y="258" width="186" height="34" fill="#111111"/>
  <text x="344" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" letter-spacing="2">20-INVENTIONS</text>
  <rect x="520" y="258" width="162" height="34" fill="#111111"/>
  <text x="540" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" letter-spacing="2">12-MCP-TOOLS</text>
  <rect x="692" y="258" width="132" height="34" fill="#111111"/>
  <text x="712" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" letter-spacing="2">250-TESTS</text>
  <rect x="834" y="258" width="116" height="34" fill="#ea580c"/>
  <text x="858" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f2f1ea" letter-spacing="2">.AEGIS</text>
</svg>
